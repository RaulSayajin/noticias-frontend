<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agregador de Notícias - CI/CD</title>
  
  <!-- Tailwind CSS para um design moderno e limpo -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonte Inter do Google Fonts para excelente legibilidade -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 to-purple-800 min-h-screen p-4 md:p-8 flex items-center justify-center antialiased">

  <div class="max-w-3xl w-full bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 rounded-3xl shadow-2xl border border-slate-800 p-4 md:p-10 space-y-8 my-6">
    
    <!-- HEADER -->
    <header class="text-center space-y-2">
      <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight flex items-center justify-center gap-3 drop-shadow-lg">
        <span class="bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">📰 Agregador de Notícias</span>
      </h1>
      <p class="text-xs md:text-sm text-indigo-200 font-semibold tracking-wide uppercase">
        v1.1.0 &mdash; CI/CD com <span class="text-indigo-400">Vercel</span> + <span class="text-purple-400">Render</span>
      </p>
    </header>

    <!-- ÁREA DE MENSAGENS -->
    <div id="mensagem" class="hidden transition-all duration-300"></div>

    <!-- BOTÃO CARREGAR -->
    <div class="flex">
      <button 
        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 active:from-indigo-700 active:to-purple-700 text-white font-bold py-3 px-6 rounded-2xl text-base shadow-lg shadow-indigo-600/30 transition-all duration-200 flex items-center justify-center gap-2"
        onclick="carregarNoticias()"
      >
        <svg class="w-5 h-5 text-indigo-200 animate-spin-hover" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 4.89M9 11l3-3m0 0l3 3m-3-3v12" />
        </svg>
        <span class="tracking-wide">🔄 Carregar Notícias</span>
      </button>
    </div>

    <!-- FORMULÁRIO ADICIONAR NOTÍCIA -->
    <section class="bg-slate-800/70 border border-slate-700/60 rounded-2xl p-6 md:p-8 space-y-4 shadow-inner">
      <h3 class="text-xl font-extrabold text-slate-100 flex items-center gap-2 tracking-tight">
        <span class="text-indigo-400">➕</span> Adicionar Nova Notícia
      </h3>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-400" for="titulo">Título</label>
          <input 
            type="text" 
            id="titulo" 
            placeholder="Ex: Novo recurso lançado" 
            class="bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
          />
        </div>
        
        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-400" for="categoria">Categoria</label>
          <input 
            type="text" 
            id="categoria" 
            placeholder="Ex: Tecnologia" 
            class="bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
          />
        </div>
        
        <div class="md:col-span-2 flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-400" for="descricao">Descrição</label>
          <textarea 
            id="descricao" 
            placeholder="Ex: Detalhes sobre o novo recurso" 
            rows="3"
            class="bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all resize-none"
          ></textarea>
        </div>
      </div>
      
      <button 
        onclick="criarNoticia()" 
        class="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 active:from-emerald-700 active:to-emerald-600 text-white font-bold py-3 px-6 rounded-2xl text-base transition-all shadow-md shadow-emerald-600/20"
      >
        <span class="tracking-wide">Enviar Notícia</span>
      </button>
    </section>

    <!-- FEED DE NOTÍCIAS -->
    <section class="space-y-4">
      <h2 class="text-2xl font-extrabold text-slate-100 border-b border-slate-800 pb-2 tracking-tight">
        Notícias Carregadas:
      </h2>
      <div id="noticias" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <!-- Notícias renderizadas via JS -->
      </div>
    </section>

  </div>

  <!-- MODAL DE DETALHES DA NOTÍCIA -->
  <div 
    id="modal-detalhe" 
    class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-350"
  >
    <div 
      class="bg-slate-900 border border-slate-800 max-w-lg w-full rounded-2xl overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col"
    >
      <!-- Cabeçalho do Modal -->
      <div class="p-6 border-b border-slate-800/60 flex justify-between items-start gap-4">
        <div class="space-y-2">
          <span id="modal-categoria" class="inline-block px-2.5 py-1 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded-md text-[10px] font-bold uppercase tracking-wider">
            Categoria
          </span>
          <h2 id="modal-titulo" class="text-xl font-extrabold text-white leading-snug">
            Título
          </h2>
        </div>
        <button 
          onclick="fecharModal()" 
          class="bg-slate-950 hover:bg-slate-800 text-slate-400 hover:text-slate-200 p-2 rounded-xl border border-slate-800 transition-colors"
          title="Fechar"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Conteúdo do Modal -->
      <div class="p-6 overflow-y-auto max-h-[50vh] space-y-3">
        <div class="text-[10px] text-slate-500 pb-2 border-b border-slate-800/50 flex items-center gap-1">
          <span>📅 Publicação</span>
          <span id="modal-data">Recém-criado</span>
        </div>
        <p id="modal-descricao" class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap">
          Descrição completa
        </p>
      </div>

      <!-- Rodapé do Modal -->
      <div class="bg-slate-950 p-4 border-t border-slate-800/60 flex justify-end">
        <button 
          onclick="fecharModal()" 
          class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-5 py-2 rounded-xl text-xs transition-colors"
        >
          Fechar Leitura
        </button>
      </div>
    </div>
  </div>

  <!-- SCRIPT UNIFICADO PARA FUNCIONAR DIRETO NO PREVIEW -->
  <script>
    // URL da API no Render (substitua pelo seu endpoint real)
    const API_URL = "https://sua-api.onrender.com";

    // Variável global para rastrear os dados de notícias carregados em memória
    let noticiasAtuais = [];

    // Banco de Dados Simulado / Fallback para caso a API ainda não esteja online
    const defaultNews = [
      {
        id: 1,
        titulo: "Novas Práticas de CI/CD simplificam deploys na Vercel",
        descricao: "Com a integração automática ao GitHub, cada push em branches específicas dispara builds automatizados. Isso garante testes e atualizações em tempo recorde sem downtime, tornando a experiência de desenvolvimento muito mais dinâmica e fluida.",
        categoria: "Tecnologia",
        data: "Publicado em local_storage"
      },
      {
        id: 2,
        titulo: "Configurando CORS de forma correta no Express",
        descricao: "Evite o erro clássico de requisição de origens cruzadas configurando adequadamente o cabeçalho 'Access-Control-Allow-Origin' no seu backend do Render. Ao apontar especificamente para a URL de produção do seu frontend na Vercel, sua API ganha em segurança e velocidade.",
        categoria: "Desenvolvimento",
        data: "Publicado em local_storage"
      }
    ];

    // Inicializa o localStorage caso queira rodar localmente de início
    if (!localStorage.getItem("noticias_local_db")) {
      localStorage.setItem("noticias_local_db", JSON.stringify(defaultNews));
    }

    // --- CARREGAR NOTÍCIAS (GET) ---
    async function carregarNoticias() {
      const container = document.getElementById("noticias");
      
      // Feedback de Carregando
      container.innerHTML = `
        <div class="col-span-full py-10 text-center text-slate-400 space-y-3">
          <div class="w-8 h-8 border-2 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin mx-auto"></div>
          <p class="text-xs">Sincronizando feed de notícias...</p>
        </div>
      `;

      try {
        const response = await fetch(`${API_URL}/noticias`);
        if (!response.ok) throw new Error("Erro na API");
        const dados = await response.json();
        
        noticiasAtuais = dados; // Atualiza o estado global em memória
        renderizarNoticias(dados);
        exibirMensagem("Feed de notícias sincronizado com o Render!", "success");
      } catch (err) {
        // Fallback inteligente para o localStorage do navegador (assim o preview nunca falha!)
        const locais = JSON.parse(localStorage.getItem("noticias_local_db")) || [];
        
        noticiasAtuais = locais; // Atualiza o estado global em memória
        renderizarNoticias(locais);
        exibirMensagem("Modo demonstração: Exibindo notícias locais do navegador (API Render offline).", "info");
      }
    }

    // --- CRIAR NOTÍCIA (POST) ---
    async function criarNoticia() {
      const titulo = document.getElementById("titulo").value.trim();
      const descricao = document.getElementById("descricao").value.trim();
      const categoria = document.getElementById("categoria").value.trim();

      if (!titulo || !descricao || !categoria) {
        exibirMensagem("Preencha todos os campos do formulário!", "error");
        return;
      }

      const nova = {
        id: Date.now(),
        titulo,
        descricao,
        categoria,
        data: new Date().toLocaleDateString("pt-BR", { hour: "2-digit", minute: "2-digit" })
      };

      try {
        const response = await fetch(`${API_URL}/noticias`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(nova)
        });

        if (!response.ok) throw new Error("Erro de rede");
        
        exibirMensagem("Notícia publicada no Render com sucesso!", "success");
        limparCampos();
        carregarNoticias();
      } catch (err) {
        // Salva localmente se a rede falhar
        const locais = JSON.parse(localStorage.getItem("noticias_local_db")) || [];
        locais.unshift(nova);
        localStorage.setItem("noticias_local_db", JSON.stringify(locais));
        
        exibirMensagem("Notícia salva localmente (API Render não respondeu).", "success");
        limparCampos();
        carregarNoticias();
      }
    }

    // --- RENDERIZADOR DOS CARDS ---
    function renderizarNoticias(lista) {
      const container = document.getElementById("noticias");
      container.innerHTML = "";

      if (lista.length === 0) {
        container.innerHTML = `
          <div class="col-span-full py-12 text-center text-slate-500 border border-dashed border-slate-800 rounded-xl">
            <p class="text-sm font-semibold">Feed vazio</p>
            <p class="text-xs mt-1">Crie uma notícia usando o formulário acima!</p>
          </div>
        `;
        return;
      }

      lista.forEach((item) => {
        const card = document.createElement("div");
        card.className = "bg-slate-800/40 border border-slate-800 hover:border-slate-700 hover:shadow-lg p-5 rounded-xl flex flex-col justify-between transition-all duration-200 group";
        
        card.innerHTML = `
          <div class="space-y-3">
            <div class="flex justify-between items-center gap-2">
              <span class="px-2 py-0.5 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded text-[10px] font-bold uppercase tracking-wide">
                ${item.categoria}
              </span>
            </div>
            <h3 class="font-bold text-slate-100 group-hover:text-white text-base leading-snug transition-colors line-clamp-2">
              ${item.titulo}
            </h3>
            <p class="text-xs text-slate-400 line-clamp-3 leading-relaxed">
              ${item.descricao}
            </p>
          </div>

          <div class="mt-4 pt-3 border-t border-slate-800/50 flex justify-end">
            <button 
              onclick="abrirDetalhe(${item.id})"
              class="text-xs font-semibold text-indigo-400 hover:text-indigo-300 flex items-center gap-1 group/btn"
            >
              Ler notícia completa
              <span class="group-hover/btn:translate-x-1 transition-transform">→</span>
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // --- SISTEMA DE MODAL DE DETALHES ---
    function abrirDetalhe(id) {
      // Busca a notícia diretamente no estado atual em memória usando o ID único
      const noticia = noticiasAtuais.find(n => n.id == id);
      if (!noticia) return;
      
      const modal = document.getElementById("modal-detalhe");
      const modalContainer = modal.querySelector("div");

      document.getElementById("modal-titulo").innerText = noticia.titulo;
      document.getElementById("modal-descricao").innerText = noticia.descricao;
      document.getElementById("modal-categoria").innerText = noticia.categoria;
      document.getElementById("modal-data").innerText = noticia.data || "Recém-criado";

      modal.classList.remove("opacity-0", "pointer-events-none");
      modalContainer.classList.remove("scale-95");
      modalContainer.classList.add("scale-100");
    }

    function fecharModal() {
      const modal = document.getElementById("modal-detalhe");
      const modalContainer = modal.querySelector("div");

      modalContainer.classList.remove("scale-100");
      modalContainer.classList.add("scale-95");
      modal.classList.add("opacity-0", "pointer-events-none");
    }

    // Fechar ao clicar na área escura
    document.getElementById("modal-detalhe").addEventListener("click", function(e) {
      if (e.target === this) {
        fecharModal();
      }
    });

    // --- FUNÇÕES AUXILIARES ---
    function exibirMensagem(texto, tipo) {
      const box = document.getElementById("mensagem");
      box.className = "p-4 rounded-xl text-xs font-medium border flex items-center gap-2 shadow-sm transition-all duration-300";

      if (tipo === "success") {
        box.classList.add("bg-emerald-500/10", "border-emerald-500/30", "text-emerald-400");
        box.innerHTML = `🟢 ${texto}`;
      } else if (tipo === "error") {
        box.classList.add("bg-rose-500/10", "border-rose-500/30", "text-rose-400");
        box.innerHTML = `⚠️ ${texto}`;
      } else {
        box.classList.add("bg-indigo-500/10", "border-indigo-500/30", "text-indigo-400");
        box.innerHTML = `ℹ️ ${texto}`;
      }

      box.classList.remove("hidden");
      setTimeout(() => {
        box.classList.add("opacity-0");
        setTimeout(() => {
          box.classList.add("hidden");
          box.classList.remove("opacity-0");
        }, 300);
      }, 4000);
    }

    // Limpa os campos do formulário de criação
    function limparCampos() {
      document.getElementById("titulo").value = "";
      document.getElementById("descricao").value = "";
      document.getElementById("categoria").value = "";
    }

    // Carrega as notícias ao iniciar
    window.onload = carregarNoticias;
  </script>
</body>
</html>
