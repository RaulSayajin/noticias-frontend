name: Deploy Frontend - Vercel via Tag

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log de Deploy
        run: |
          echo "Frontend: Deploy iniciado para ${GITHUB_REF_NAME} (Vercel)"
          echo "Repository: ${{ github.repository }}"
          echo "Timestamp: $(date)"
